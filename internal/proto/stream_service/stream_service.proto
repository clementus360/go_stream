syntax = "proto3";

package stream_service;
option go_package = "./pb";

service StreamManager {
    // --- Lifecycle (Ingest/Processing) ---
    rpc StartStream (StartStreamRequest) returns (StartStreamResponse);
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
    rpc StopStream (StopStreamRequest) returns (StopStreamResponse);
    
    // Allows Ingest/Processing to update resolution/bitrate mid-stream
    rpc UpdateSessionMetrics (UpdateSessionMetricsRequest) returns (UpdateSessionMetricsResponse);

    // --- User Actions ---
    rpc UpdateStreamMetadata (UpdateMetadataRequest) returns (UpdateMetadataResponse);
    rpc GetLiveStreams (GetLiveStreamsRequest) returns (GetLiveStreamsResponse);
    rpc GetStream (GetStreamRequest) returns (StreamInfo);
}

enum StreamStatus {
    OFFLINE = 0;
    LIVE = 1;
    COMPLETE = 2;
    ERROR = 3;
}

message StartStreamRequest {
    string stream_key = 1;
    string resolution = 2;
    int32 bitrate = 3;
    string codec = 4;
    string category = 5;
}

message StartStreamResponse {
    int64 session_id = 1;
    int32 channel_id = 2;
}

message HeartbeatRequest {
    int64 session_id = 1;
    int32 current_viewers = 2;
}

message HeartbeatResponse {
    bool should_continue = 1;
}

message UpdateSessionMetricsRequest {
    int64 session_id = 1;
    string resolution = 2;
    int32 bitrate = 3;
}

message UpdateSessionMetricsResponse {
    bool success = 1;
}

message StopStreamRequest {
    int64 session_id = 1;
}

message StopStreamResponse {
    uint32 duration_seconds = 1;
}

message UpdateMetadataRequest {
    int32 channel_id = 1;
    string title = 2;
    string description = 3;
}
message UpdateMetadataResponse {
    bool success = 1;
}

message GetLiveStreamsRequest {
    int32 limit = 1;
}

message GetLiveStreamsResponse {
    repeated StreamInfo streams = 1;
}

message GetStreamRequest {
    // Can be a numeric string ("123") or a username ("alice")
    string identifier = 1; 
}

message StreamInfo {
    int32 channel_id = 1;
    int64 session_id = 2;
    string username = 3;
    string title = 4;
    string description = 5;
    int32 viewer_count = 6;
    string resolution = 7;
    StreamStatus status = 8; // Good to include for frontend logic
    string profile_image_url = 9;
}